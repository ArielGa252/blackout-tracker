<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Obra • Portal Manhwas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <header class="topbar">
    <a class="brand" href="index.html"><span class="brand-logo">PM</span><span><strong>Portal Manhwas</strong><small>Detalhes da obra</small></span></a>
    <nav class="nav-actions"><button id="themeBtn" class="ghost-btn">🌙</button><a class="ghost-btn" href="index.html">Voltar</a></nav>
  </header>
  <main class="container">
    <section id="mangaHeader" class="manga-header card glow"></section>
    <section class="controls card">
      <div class="search-wrap"><span>🔎</span><input id="chapterSearch" type="search" placeholder="Buscar capítulo..." /></div>
      <select id="chapterFilter"><option value="todos">Todos</option><option value="lidos">Lidos</option><option value="nao-lidos">Não lidos</option></select>
      <button id="markAllBtn" class="primary-btn">Marcar todos como lidos</button>
    </section>
    <section id="chaptersGrid" class="chapters-grid"></section>
    <section id="emptyState" class="empty card hidden"><h2>Capítulos não encontrados</h2><p>Confira o arquivo <code>mangas_resultado.json</code>.</p></section>
  </main>
  <script src="manhwa.js"></script>
</body>
</html>
