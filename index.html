<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>📚 Tracker</h1>
    <input type="text" id="search" placeholder="Pesquisar manhwa...">
    <div class="stats">
        <div class="box"><h2 id="total">0</h2><p>Total</p></div>
        <div class="box"><h2 id="readed">0</h2><p>Lidos</p></div>
        <div class="box"><h2 id="completed">0</h2><p>Finalizados</p></div>
    </div>
</header>
<main id="grid"></main>
<script src="app.js"></script>
</body>
</html>
